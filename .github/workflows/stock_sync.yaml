name: Daily Stock Data Update

on:
  schedule:
    - cron: '0 2 * * 6'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# 設定全域環境變數，解決 2026 年的 Node.js 棄用警告與時區同步
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TZ: Asia/Taipei  # 🆕 新增：強制指定虛擬主機為台灣時區

jobs:
  update-stock:
    runs-on: ubuntu-latest

    steps:
      - name: 檢出儲存庫代碼
        uses: actions/checkout@v5

      - name: 設定 Python 環境
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          # 重新啟用快取，因為現在有 requirements.txt 可以對照了
          cache: 'pip' 

      - name: 安裝相依套件
        run: |
          python -m pip install --upgrade pip
          # 讓機器人直接讀取你的 requirements.txt 來安裝所有套件
          pip install -r requirements.txt

      - name: 執行資料抓取與分析
        run: python fetch_and_analyze.py

      - name: 自動提交更新資料
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add stock_data.json rejected_stocks.json
          if git diff --staged --quiet; then
            echo "資料無變更，跳過 Commit"
          else
            git commit -m "📈 自動更新股票資料: $(date +'%Y-%m-%d %H:%M')"
            git push
          fi

      - name: 部署至 GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 發布部署
        uses: actions/deploy-pages@v5
