<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>淘汰名單查詢系統</title>
    <style>
        :root {
            --primary-color: #4A90E2;
            --bg-color: #F5F7FA;
            --card-bg: #FFFFFF;
            --text-main: #333333;
            --text-muted: #888888;
            --danger-color: #e53e3e;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 15px;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: bold;
            background: #eef2f6;
            padding: 8px 16px;
            border-radius: 20px;
            transition: background 0.2s;
        }

        .back-link:hover {
            background: #dbeafe;
        }

        h1 {
            font-size: 1.8rem;
            margin: 0 0 10px 0;
        }

        .search-box {
            width: 100%;
            padding: 16px 20px;
            font-size: 1.2rem;
            border: 2px solid #E2E8F0;
            border-radius: 12px;
            box-sizing: border-box;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: border-color 0.2s;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .result-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 5px solid var(--danger-color);
            animation: fadeIn 0.3s ease;
        }

        .result-card h3 {
            margin: 0 0 12px 0;
            color: var(--text-main);
            font-size: 1.3rem;
        }

        .reason-badge {
            display: inline-block;
            background: #FFF5F5;
            color: var(--danger-color);
            padding: 12px 16px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 1.05rem;
            line-height: 1.5;
            width: 100%;
            box-sizing: border-box;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            font-size: 1.1rem;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="stockindex.html" class="back-link">← 返回主儀表板</a>
            <h1>🕵️‍♂️ 淘汰名單查詢系統</h1>
            <p style="color: var(--text-muted);">快速查詢股票為何沒有進入資優生名單</p>
        </div>

        <input type="text" id="searchInput" class="search-box" placeholder="請輸入股票代號或名稱 (例: 2330 或 台積電)" autocomplete="off">

        <div id="resultsContainer">
            <div class="empty-state">
                請在上方輸入代號或名稱開始即時查詢 🔍
            </div>
        </div>
    </div>

    <script>
        let rejectedData = [];
        const searchInput = document.getElementById('searchInput');
        const resultsContainer = document.getElementById('resultsContainer');

        // 載入淘汰名單 JSON 資料
        fetch('rejected_stocks.json')
            .then(response => response.json())
            .then(data => {
                rejectedData = data;
            })
            .catch(error => {
                console.error('載入失敗:', error);
                resultsContainer.innerHTML = '<div class="empty-state" style="color: var(--danger-color);">無法載入 rejected_stocks.json，請確認 Python 腳本已執行完畢且產生了該檔案 🚧</div>';
            });

        // 實作即時過濾搜尋
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.trim().toLowerCase();
            
            // 如果輸入框被清空，恢復預設畫面
            if (!query) {
                resultsContainer.innerHTML = '<div class="empty-state">請在上方輸入代號或名稱開始即時查詢 🔍</div>';
                return;
            }

            // 同時比對「代號」與「名稱」
            const filtered = rejectedData.filter(stock => 
                stock.symbol.includes(query) || 
                stock.name.toLowerCase().includes(query)
            );

            // 渲染結果：找不到資料的狀況
            if (filtered.length === 0) {
                resultsContainer.innerHTML = `
                    <div class="empty-state" style="color: #38a169; font-weight: bold;">
                        🎉 此股票可能在合格名單中，或查無資料！
                    </div>`;
                return;
            }

            // 渲染結果：找到資料的卡片列
            resultsContainer.innerHTML = filtered.map(stock => `
                <div class="result-card">
                    <h3>${stock.name} (${stock.symbol})</h3>
                    <div class="reason-badge">
                        <strong>⚠️ 淘汰原因：</strong><br>${stock.reason}
                    </div>
                </div>
            `).join('');
        });
    </script>
</body>
</html>
